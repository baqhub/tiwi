name: Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26.3.0
          cache: "yarn"

      - name: Install
        run: yarn install --immutable

      - name: Check
        run: yarn exec vp check

      - name: Build
        run: yarn exec vp pack

      - name: Test
        run: yarn exec vp test run
